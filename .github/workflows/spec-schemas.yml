name: spec-schemas

# Lints the formal-spec JSON Schemas and validates their example payloads
# (kiosk.tech/spec/schemas) on every change. Keeps the machine-readable
# contract honest and consistent with the narrative specification.html.

on:
  push:
    paths:
      - "spec/**"
      - ".github/workflows/spec-schemas.yml"
  pull_request:
    paths:
      - "spec/**"
      - ".github/workflows/spec-schemas.yml"

jobs:
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The formal spec (protocol.md + schemas + examples) MUST be pure ASCII —
      # an RFC-style contract for adopters/porters, no encoding surprises.
      - name: Formal spec is ASCII
        run: |
          if grep -rlP '[^\x00-\x7F]' spec/; then
            echo "::error::Non-ASCII byte(s) found in spec/ — the formal spec must be pure ASCII (see the files above)."
            exit 1
          fi
          echo "spec/ is pure ASCII."
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ajv-cli
        run: npm i -g ajv-cli@5.0.0
      - name: Validate schemas + examples
        run: bash spec/schemas/validate.sh
